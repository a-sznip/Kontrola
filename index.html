<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Zarządzania Kontrolami</title>
    
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; z-index: 2000; }
        .modal-content { transform: translateY(-20px); transition: transform 0.3s ease; max-height: 90vh; overflow-y: auto; }
        .modal.open .modal-content { transform: translateY(0); }
        .signature-pad { border: 2px solid #3b82f6; background-color: #fff; cursor: crosshair; touch-action: none; height: 12rem; }
        #identification-map, #bulk-identification-map { height: 65vh; width: 100%; }
        .leaflet-crosshair { cursor: crosshair; }
        .center-marker { position: absolute; top: 50%; left: 50%; width: 25px; height: 41px; margin-left: -12.5px; margin-top: -41px; pointer-events: none; background-image: url('https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png'); background-size: contain; background-repeat: no-repeat; z-index: 1000; }
        /* Baner aktualizacji */
        #updateBanner { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: #000; padding: 15px; border-radius: 8px; z-index: 9999; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-weight: bold; }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div id="updateBanner">
        Nowa wersja dostępna! <button onclick="applyUpdate()" class="bg-black text-white px-3 py-1 rounded ml-2">ODŚWIEŻ</button>
    </div>

    <div id="app-view">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Panel Zarządzania <span class="text-xs text-blue-500">v2.3</span></h1>
            <button id="logout-btn" class="bg-gray-500 text-white py-1 px-3 rounded-lg text-sm">Wyloguj</button>
        </div>
        
        <div class="bg-white rounded-xl shadow-lg p-4 mx-auto max-w-4xl">
            <div class="border-b border-gray-200 mb-6 overflow-x-auto">
                <nav class="flex space-x-2 pb-2" aria-label="Tabs">
                    <button id="tab-controls" class="tab-button active whitespace-nowrap py-2 px-3 border-b-2 font-medium text-sm">Kontrole</button>
                    <button id="tab-identifications" class="tab-button whitespace-nowrap py-2 px-3 border-b-2 font-medium text-sm border-transparent text-gray-500">Teren</button>
                    <button id="tab-bulk-identifications" class="tab-button whitespace-nowrap py-2 px-3 border-b-2 font-medium text-sm border-transparent text-gray-500">Zbiorcze</button>
                </nav>
            </div>

            <div id="controls-content-view">
                <div class="flex flex-col gap-3 mb-6">
                    <button id="add-control-btn" class="bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md">Dodaj kontrolę</button>
                    <div class="flex gap-2">
                        <button id="export-data-btn" class="flex-1 bg-gray-600 text-white py-2 rounded-lg text-xs">Eksportuj .eco</button>
                        <button id="import-data-btn" class="flex-1 bg-gray-600 text-white py-2 rounded-lg text-xs">Importuj .eco</button>
                        <input type="file" id="import-file-input" class="hidden" accept=".eco,.json">
                    </div>
                </div>
                <div id="controls-list" class="space-y-4"></div>
            </div>

            <div id="identifications-content-view" class="hidden">
                 <button id="add-identification-btn" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg mb-6">Nowa Identyfikacja</button>
                 <div id="identifications-list" class="space-y-4"></div>
            </div>

            <div id="bulk-identification-content-view" class="hidden">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button id="add-bulk-point-mode-btn" class="bg-green-600 text-white font-bold py-2 rounded-lg text-sm">Dodaj Punkt</button>
                    <button id="locate-me-bulk-btn" class="bg-blue-600 text-white font-bold py-2 rounded-lg text-sm">Lokalizuj</button>
                </div>
                <div id="bulk-identification-map-container" class="relative">
                    <div id="bulk-identification-map" class="rounded-lg border"></div>
                </div>
                <button id="generate-bulk-report-btn" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg mt-4">Generuj Raport Zbiorczy</button>
            </div>
        </div>
    </div>

    <div id="control-modal" class="modal fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 opacity-0 invisible">
        <div class="modal-content bg-white rounded-xl p-6 w-full max-w-xl">
            <h2 id="modal-title" class="text-xl font-bold mb-4">Dane kontroli</h2>
            <form id="control-form" class="space-y-4">
                <input type="text" id="control-street" placeholder="Ulica" class="w-full p-3 border rounded-lg">
                <input type="text" id="control-house-number" placeholder="Nr domu" class="w-full p-3 border rounded-lg">
                <input type="text" id="control-city" placeholder="Miejscowość" class="w-full p-3 border rounded-lg">
                <input type="date" id="control-date" class="w-full p-3 border rounded-lg">
                <div id="participants-container" class="grid grid-cols-2 gap-2 text-xs"></div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Zapisz</button>
                <button type="button" class="back-to-panel-btn w-full bg-gray-300 py-2 rounded-lg mt-2">Anuluj</button>
            </form>
        </div>
    </div>

    <div id="message-box" class="fixed bottom-8 right-8 p-4 rounded-lg text-white shadow-lg z-50 transition-opacity duration-300 opacity-0 hidden"></div>
    <div id="pdf-render-template" class="absolute -left-[9999px]"></div>

    <script src="./data.js"></script>
    <script src="./index.js"></script>

    <script>
        // Logowanie błędów bezpośrednio na ekranie telefonu (tylko do debugowania)
        window.onerror = function(msg, url, line) {
            alert("Błąd JS: " + msg + "\nLinia: " + line);
            return false;
        };
    </script>
</body>
</html>
